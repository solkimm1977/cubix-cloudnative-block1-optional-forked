# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package and Docker Image

on:
  push:
    branches:
    - main
    - ci/*
jobs:
  maven:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml

    - name: Check java version
      run: java -version
    - name: Build with Maven
      run: ./mvnw clean package verify
    - name: Upload artifact for Docker job
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: '${{ github.workspace }}/target/*.jar'    

  docker:
  
    runs-on: ubuntu-latest
    needs: maven
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Download artifact from maven job
      uses: actions/download-artifact@v4
      with:
        name: java-app
        
    - name: docker login
      run: docker login ghcr.io -u solkimm1977 -p ${{ github.token }}
    - name: docker image
      run: docker build . -t ghcr.io/solkimm1977/cubix/1/optional/app:springboot
    - name: docker push
      run: docker push ghcr.io/solkimm1977/cubix/1/optional/app:springboot
   